<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found — Switch Point</title>
    <meta name="description" content="The page you're looking for doesn't exist. Return to Switch Point's homepage." />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#0D1117" />
    <link rel="canonical" href="https://www.sw-point.com/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0D1117;
        color: #E6EDF3;
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .container { max-width: 480px; }
      .code {
        font-size: 96px;
        font-weight: 800;
        background: linear-gradient(90deg, #5BA8FF 0%, #26C6B0 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        margin-bottom: 16px;
      }
      h1 {
        font-size: 24px;
        font-weight: 800;
        margin-bottom: 12px;
        letter-spacing: -0.03em;
      }
      p {
        font-size: 15px;
        color: #8B949E;
        line-height: 1.7;
        margin-bottom: 32px;
      }
      a.btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 14px 28px;
        background: #5BA8FF;
        color: #fff;
        text-decoration: none;
        border-radius: 999px;
        font-size: 15px;
        font-weight: 700;
        transition: all 0.3s ease;
      }
      a.btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(91,168,255,0.4);
      }
      .logo {
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, #5BA8FF 0%, #26C6B0 100%);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 32px;
        font-size: 16px;
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.03em;
      }
    </style>
    <!-- SPA redirect for GitHub Pages -->
    <script>
      // Single Page App redirect for GitHub Pages
      // Redirects all paths back to index.html with the path as a query param
      var pathSegmentsToKeep = 0;
      var l = window.location;
      if (l.pathname !== '/' && l.pathname !== '/index.html') {
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      }
    </script>
  </head>
  <body>
    <div class="container">
      <div class="logo">SP</div>
      <div class="code">404</div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or has been moved. Let's get you back to our portfolio.</p>
      <a href="https://www.sw-point.com/" class="btn">
        Back to Homepage
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
    </div>
  </body>
</html>
